name: terraform-module-upgrade-agent

description: >
  AI agent that reads Terraform modules from the repository,
  fetches latest versions from Confluence DEV space,
  applies upgrade rules, and raises pull requests.

model: gpt-5.3

capabilities:
  - read_repository
  - edit_files
  - create_branches
  - create_pull_requests
  - run_shell_commands
  - http_requests

entrypoint:
  prompt_file: .github/copilot-agent.md

environment:
  required_secrets:
    - CONFLUENCE_TOKEN
    - GITHUB_TOKEN

  variables:
    CONFLUENCE_BASE_URL: "https://<your-domain>.atlassian.net"
    CONFLUENCE_SPACE: "DEV"

permissions:
  contents: write
  pull_requests: write

triggers:
  manual: true

  schedule:
    - cron: "0 3 * * 1"   # Weekly run

execution:
  max_runtime_minutes: 30
  retry_attempts: 1

safety:
  require_pull_request: true
  block_direct_push: true

logging:
  level: info
